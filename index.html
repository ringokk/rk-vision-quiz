<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>睿抗机器视觉刷题</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f5f0;
      --panel: #ffffff;
      --ink: #1f2528;
      --muted: #667176;
      --line: #dedbd0;
      --soft: #ece9df;
      --brand: #0f766e;
      --brand-strong: #0b5d56;
      --accent: #b45309;
      --danger: #c2410c;
      --ok: #15803d;
      --shadow: 0 18px 50px rgba(31, 37, 40, .09);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, .08), transparent 34%),
        linear-gradient(315deg, rgba(180, 83, 9, .08), transparent 30%),
        var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      min-height: 38px;
      cursor: pointer;
      transition: .18s ease;
    }

    button:hover { border-color: #b9b4a7; transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: .45; transform: none; }

    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 22px;
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      gap: 18px;
    }

    .sidebar, .main, .drawer {
      background: rgba(255, 255, 255, .86);
      border: 1px solid rgba(222, 219, 208, .9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .sidebar {
      position: sticky;
      top: 22px;
      height: calc(100vh - 44px);
      border-radius: 10px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 4px;
    }

    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: #0f766e;
      color: white;
      border-radius: 8px;
      font-weight: 800;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.15;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .tabs {
      display: grid;
      gap: 7px;
    }

    .tab {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      padding: 10px 12px;
      text-align: left;
      background: transparent;
    }

    .tab.active {
      color: white;
      background: var(--brand);
      border-color: var(--brand);
    }

    .tab small {
      color: inherit;
      opacity: .75;
      font-size: 11px;
    }

    .panel {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      display: grid;
      gap: 10px;
    }

    .panel h2 {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
    }

    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.75);
      min-height: 38px;
      padding: 8px 10px;
      outline: none;
    }

    .field textarea { min-height: 84px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15,118,110,.13); }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .segmented button.active {
      color: white;
      background: var(--ink);
      border-color: var(--ink);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .stat {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(246, 245, 240, .58);
    }

    .stat strong {
      display: block;
      font-size: 21px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 11px;
    }

    .main {
      min-height: calc(100vh - 44px);
      border-radius: 10px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.62);
    }

    .topbar h2 {
      margin: 0;
      font-size: 18px;
    }

    .topbar p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }

    .primary {
      color: white;
      background: var(--brand);
      border-color: var(--brand);
      padding: 0 14px;
      font-weight: 700;
    }

    .primary:hover { background: var(--brand-strong); border-color: var(--brand-strong); }

    .danger { color: var(--danger); }

    .content {
      padding: 20px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 312px;
      gap: 18px;
      align-items: start;
    }

    .question-area {
      min-width: 0;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(31,37,40,.05);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--soft);
      color: #4b5560;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill.ok { color: var(--ok); background: rgba(21,128,61,.1); }
    .pill.warn { color: var(--accent); background: rgba(180,83,9,.12); }
    .pill.bad { color: var(--danger); background: rgba(194,65,12,.1); }

    .stem {
      margin: 0;
      font-size: clamp(20px, 2vw, 28px);
      line-height: 1.55;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }

    .option {
      width: 100%;
      display: grid;
      grid-template-columns: 38px 1fr;
      align-items: center;
      gap: 12px;
      text-align: left;
      padding: 12px;
      min-height: 58px;
      background: #fcfbf7;
    }

    .option .letter {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--soft);
      font-weight: 800;
    }

    .option.selected {
      border-color: var(--brand);
      background: rgba(15,118,110,.08);
    }

    .option.correct {
      border-color: rgba(21,128,61,.55);
      background: rgba(21,128,61,.1);
    }

    .option.wrong {
      border-color: rgba(194,65,12,.55);
      background: rgba(194,65,12,.1);
    }

    .option p {
      margin: 0;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .result {
      display: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      background: #fbfaf6;
    }

    .result.show { display: grid; gap: 12px; }
    .result h3 { margin: 0; font-size: 16px; }
    .result p { margin: 0; color: var(--muted); line-height: 1.55; }

    .review-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .side-stack {
      display: grid;
      gap: 14px;
    }

    .drawer {
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(31,37,40,.05);
    }

    .drawer h3 {
      margin: 0 0 12px;
      font-size: 15px;
    }

    .progress-line {
      height: 8px;
      border-radius: 999px;
      background: var(--soft);
      overflow: hidden;
    }

    .progress-line span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--brand), #84cc16);
    }

    .mini-list {
      display: grid;
      gap: 8px;
      max-height: 330px;
      overflow: auto;
    }

    .mini-item {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fcfbf7;
      text-align: left;
    }

    .mini-item.active { border-color: var(--brand); box-shadow: inset 3px 0 0 var(--brand); }
    .mini-item strong { font-size: 13px; }
    .mini-item span {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .heatmap {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      gap: 4px;
    }

    .dot {
      aspect-ratio: 1;
      border-radius: 3px;
      background: #e8e4d8;
      border: 0;
      min-height: 0;
      padding: 0;
    }

    .dot.seen { background: #bdd7d2; }
    .dot.right { background: #15803d; }
    .dot.wrong { background: #c2410c; }
    .dot.current { outline: 2px solid var(--ink); outline-offset: 1px; }

    .browse {
      display: none;
      grid-column: 1 / -1;
    }

    .browse.show {
      display: grid;
      gap: 12px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .table th, .table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    .table th {
      color: var(--muted);
      background: #f7f4eb;
      font-weight: 700;
    }

    .table tr:hover td { background: rgba(15,118,110,.05); }
    .table button { min-height: 30px; padding: 0 10px; }

    .exam-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 10px;
    }

    .exam-bar.show { display: flex; }

    .exam-home {
      display: none;
      gap: 16px;
    }

    .exam-home.show {
      display: grid;
    }

    .exam-hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(31,37,40,.05);
    }

    .exam-hero h3 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .exam-hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .score {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin: 16px 0;
    }

    .score strong {
      font-size: clamp(42px, 8vw, 72px);
      line-height: 1;
      color: var(--brand);
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      width: min(360px, calc(100vw - 44px));
      display: none;
      padding: 13px 15px;
      border-radius: 10px;
      background: #1f2528;
      color: white;
      box-shadow: var(--shadow);
      z-index: 5;
    }

    .toast.show { display: block; }

    @media (max-width: 1080px) {
      .app { grid-template-columns: 1fr; padding: 12px; }
      .sidebar { position: static; height: auto; }
      .content { grid-template-columns: 1fr; }
      .side-stack { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 680px) {
      .topbar, .content { padding: 14px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; width: 100%; }
      .question-card { padding: 18px; }
      .side-stack { grid-template-columns: 1fr; }
      .review-buttons { grid-template-columns: 1fr; }
      .heatmap { grid-template-columns: repeat(10, 1fr); }
      .stem { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">RK</div>
        <div>
          <h1>睿抗机器视觉刷题</h1>
          <p>双题库 · 本地进度</p>
        </div>
      </div>

      <nav class="tabs" id="modeTabs"></nav>

      <section class="panel">
        <h2>题库</h2>
        <div class="field">
          <label for="bankSelect">当前题库</label>
          <select id="bankSelect"></select>
        </div>
        <p id="bankInfo" style="margin:0;color:var(--muted);font-size:12px;line-height:1.5"></p>
      </section>

      <section class="panel">
        <h2>筛选</h2>
        <div class="field">
          <label for="searchInput">搜索</label>
          <input id="searchInput" type="search" placeholder="题干 / 选项 / 解析">
        </div>
        <div class="field">
          <label for="categorySelect">分类</label>
          <select id="categorySelect"></select>
        </div>
        <div class="field">
          <label for="tagSelect">标签</label>
          <select id="tagSelect"></select>
        </div>
        <div class="segmented" id="typeTabs">
          <button data-type="all" class="active">全部</button>
          <button data-type="single">单选</button>
          <button data-type="multiple">多选</button>
          <button data-type="judge">判断</button>
        </div>
      </section>

      <section class="panel">
        <h2>总览</h2>
        <div class="stats-grid">
          <div class="stat"><strong id="statAnswered">0</strong><span>已练</span></div>
          <div class="stat"><strong id="statRate">0%</strong><span>正确率</span></div>
          <div class="stat"><strong id="statWrong">0</strong><span>错题</span></div>
          <div class="stat"><strong id="statDue">0</strong><span>待复习</span></div>
        </div>
      </section>

      <section class="panel">
        <h2>数据</h2>
        <div class="segmented">
          <button id="exportBtn" title="导出进度">导出</button>
          <button id="importBtn" title="导入进度">导入</button>
          <button id="resetBtn" class="danger" title="清空本地进度">重置</button>
          <button id="printBtn" title="打印当前题目">打印</button>
        </div>
        <input id="importFile" type="file" accept="application/json" hidden>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="viewTitle">智能练习</h2>
          <p id="viewSubtitle">优先安排错题、到期复习题和未练题。</p>
        </div>
        <div class="actions">
          <button id="prevBtn" class="icon-btn" title="上一题">←</button>
          <button id="randomBtn" class="icon-btn" title="随机一题">⤨</button>
          <button id="favBtn" class="icon-btn" title="收藏">☆</button>
          <button id="submitBtn" class="primary">提交</button>
          <button id="nextBtn" class="primary">下一题</button>
        </div>
      </header>

      <section class="content">
        <div class="question-area" id="practiceView">
          <section class="exam-home" id="examHome"></section>
          <div class="exam-bar" id="examBar">
            <strong id="examTimer">00:00</strong>
            <span id="examProgress">0 / 0</span>
            <span id="examMix">单选 30 · 多选 10 · 判断 10</span>
            <button id="finishExamBtn">交卷</button>
          </div>
          <article class="question-card" id="questionCard">
            <div class="meta-row" id="metaRow"></div>
            <p class="stem" id="stem"></p>
            <div class="options" id="options"></div>
          </article>
          <section class="result" id="resultBox"></section>
          <section class="drawer" id="noteDrawer">
            <h3>我的笔记</h3>
            <div class="field">
              <textarea id="noteInput" placeholder="写下容易混淆的点"></textarea>
            </div>
          </section>
        </div>

        <aside class="side-stack" id="sideStack">
          <section class="drawer">
            <h3>当前进度</h3>
            <div class="progress-line"><span id="progressFill"></span></div>
            <div class="stats-grid" style="margin-top:12px">
              <div class="stat"><strong id="statStreak">0</strong><span>连对</span></div>
              <div class="stat"><strong id="statMastered">0</strong><span>掌握</span></div>
            </div>
          </section>

          <section class="drawer">
            <h3>题目地图</h3>
            <div class="heatmap" id="heatmap"></div>
          </section>

          <section class="drawer">
            <h3>推荐队列</h3>
            <div class="mini-list" id="queueList"></div>
          </section>
        </aside>

        <section class="browse" id="browseView">
          <table class="table">
            <thead>
              <tr>
                <th>题号</th>
                <th>题干</th>
                <th>分类</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="browseBody"></tbody>
          </table>
        </section>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const BANKS = [{"id":"rk2026","name":"2026睿抗线上选拔训练题库","shortName":"训练题库","questions":[{"id":1,"bankId":"rk2026","number":1,"sourceNumber":1,"stem":"在进行视觉定位引导时，需要通过_______来建立视觉坐标系与机械手坐标系之间的对应关系。","options":[{"label":"A","text":"检测"},{"label":"B","text":"标定"},{"label":"C","text":"定位"},{"label":"D","text":"曝光"}],"answer":["B"],"category":"机器视觉基础","tags":["综合"],"explanation":"标定就是计算相机图像坐标和机械臂空间坐标的转换关系；检测、定位只是找工件，曝光只控制画面亮度，无法建立坐标映射。","type":"single"},{"id":2,"bankId":"rk2026","number":2,"sourceNumber":2,"stem":"_______的目的在于提高图像信息的可读取性，增强兴趣区域和非兴趣区域的可分离性，增强缺陷判别效果。","options":[{"label":"A","text":"图像增强"},{"label":"B","text":"图像降噪"},{"label":"C","text":"阈值分割"},{"label":"D","text":"图像矫正"}],"answer":["A"],"category":"图像处理基础","tags":["综合"],"explanation":"图像增强专门提亮、加大对比度，让目标和背景更容易区分；降噪只去除噪点，分割只分黑白，矫正只修正变形。","type":"single"},{"id":3,"bankId":"rk2026","number":3,"sourceNumber":3,"stem":"表面缺陷包括_______。","options":[{"label":"A","text":"金属表面的划痕、斑点、孔洞"},{"label":"B","text":"纸张表面的色差、压痕"},{"label":"C","text":"玻璃等非金属表面的夹杂、破损、污点、划痕"},{"label":"D","text":"以上都是"}],"answer":["D"],"category":"图像处理基础","tags":["综合"],"explanation":"金属、纸张、玻璃制品的各类表面破损、印记都属于工业表面缺陷检测范畴。","type":"single"},{"id":4,"bankId":"rk2026","number":4,"sourceNumber":4,"stem":"图像增强不包括_______。增强图像中的有用信息，改善图像的视觉效果。","options":[{"label":"A","text":"锐化"},{"label":"B","text":"对比度调节"},{"label":"C","text":"Gamma调节和亮度校正"},{"label":"D","text":"图像矫正"}],"answer":["D"],"category":"图像处理基础","tags":["综合"],"explanation":"锐化、调亮度、对比度都属于图像增强；图像矫正用于修正图像畸变、偏移，不属于增强。","type":"single"},{"id":5,"bankId":"rk2026","number":5,"sourceNumber":5,"stem":"_______对输入图像进行均值滤波，获取均值滤波图像与原图像进行对比得到图像残差，依据某种规律进行像素重置，主要用于对输入的光照不均匀图像进行光照校正。","options":[{"label":"A","text":"图像矫正"},{"label":"B","text":"阴影校正"},{"label":"C","text":"如下增强"},{"label":"D","text":"图像滤波"}],"answer":["B"],"category":"图像处理基础","tags":["综合"],"explanation":"阴影校正专门解决光照明暗不均问题，通过均值滤波消除画面明暗阴影。","type":"single"},{"id":6,"bankId":"rk2026","number":6,"sourceNumber":6,"stem":"图像的二值化处理就是将图像上的点的灰度置为0或255，也 t":"错误"}],"answer":["A"],"category":"机器人与标定","tags":["综合"],"explanation":"圆查找提取轮廓点最小二乘拟合圆，输出圆心、直径。","type":"judge"},{"id":192,"bankId":"rk2026","number":192,"sourceNumber":192,"stem":"焦距越小，景深越小。","options":[{"label":"A","text":"正确"},{"label":"B","text":"错误"}],"answer":["B"],"category":"成像与光学","tags":["综合"],"explanation":"在光圈、物距不变的情况下，焦距与景深呈负相关。焦距越小，成像的清晰纵深范围越大，景深越大；焦距越长，景深越小。因此题干表述错误。","type":"judge"},{"id":193,"bankId":"rk2026","number":193,"sourceNumber":193,"stem":"采集分为相机图像、本地图像和存储图像。","options":[{"label":"A","text":"正确"},{"label":"B","text":"错误"}],"answer":["A"],"category":"成像与光学","tags":["综合"],"explanation":"机器视觉软件的图像采集渠道分为三类，分别是相机实时采集图像、本地设备导入图像、系统历史存储图像，覆盖调试、实测、离线复盘等场景，题干表述正确。","type":"judge"},{"id":194,"bankId":"rk2026","number":194,"sourceNumber":194,"stem":"视觉处理工具包括定位、测量、识别、标定、对位、图像处理、颜色处理、缺陷检测、逻辑工具等模块，不可依据方案需求选择相应的算法模块组合使用。","options":[{"label":"A","text":"正确"},{"label":"B","text":"错误"}],"answer":["B"],"category":"视觉软件应用","tags":["综合"],"explanation":"机器视觉各类功能模块均为独立可调用单元，实际项目可根据检测、识别、测量等不同方案需求，自由选配、组合对应算法模块，灵活适配不同工况，并非固定不可调整，题干表述错误。","type":"judge"},{"id":195,"bankId":"rk2026","number":195,"sourceNumber":195,"stem":"同一视野下，焦距越长，视场角越大。","options":[{"label":"A","text":"正确"},{"label":"B","text":"错误"}],"answer":["B"],"category":"成像与光学","tags":["综合"],"explanation":"视场角大小由焦距决定，焦距越短，镜头取景范围越广，视场角越大；焦距越长，取景范围越窄，视场角越小。因此题干表述错误。","type":"judge"},{"id":196,"bankId":"rk2026","number":196,"sourceNumber":196,"stem":"光圈越大，图像亮度越暗。","options":[{"label":"A","text":"正确"},{"label":"B","text":"错误"}],"answer":["B"],"category":"成像与光学","tags":["综合"],"explanation":"光圈决定镜头进光量，光圈数值越大，通光孔径越大，进光量越多，采集的图像画面越明亮；光圈越小，画面越昏暗，题干表述错误。","type":"judge"},{"id":197,"bankId":"rk2026","number":197,"sourceNumber":197,"stem":"产品尺寸为70mm×50mm的产品，视野应该估算为80mm×60mm。","options":[{"label":"A","text":"正确"},{"label":"B","text":"错误"}],"answer":["A"],"category":"成像与光学","tags":["综合"],"explanation":"机器视觉视野选型需预留安全余量，防止工件偏移、边缘裁切。针对70mm×50mm的工件，各边预留5mm余量，将视野设计为80mm×60mm，是工业视觉标准选型方式，题干表述正确。","type":"judge"},{"id":198,"bankId":"rk2026","number":198,"sourceNumber":198,"stem":"字符识别的图像采集、图像处理、ROI分割和字符训练学习的图像采集、图像处理、ROI分割是一致的，而且各个步骤处理的参数必须和训练完全一样，否则获取的单字符图片完全没有可比性。","options":[{"label":"A","text":"正确"},{"label":"B","text":"错误"}],"answer":["A"],"category":"识别与检测","tags":["综合"],"explanation":"字符识别依靠训练样本建立匹配模型，实测与训练阶段的采集参数、图像处理参数、ROI分割范围必须完全统一。参数不一致会导致字符图像特征偏差，使模型无法精准匹配识别，题干表述正确。","type":"judge"},{"id":199,"bankId":"rk2026","number":199,"sourceNumber":199,"stem":"二维码识别的成功率很大程度上与二维码码图像本身的质量无关。","options":[{"label":"A","text":"正确"},{"label":"B","text":"错误"}],"answer":["B"],"category":"识别与检测","tags":["综合"],"explanation":"二维码识别成功率高度依赖图像质量，图像模糊、反光、畸变、破损、噪点过多等问题，都会大幅降低识别准确率，甚至识别失效，题干表述错误。","type":"judge"},{"id":200,"bankId":"rk2026","number":200,"sourceNumber":200,"stem":"字符识别系统的软件系统包括图像采集、图像处理、图像分割和字符识别等模块","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["A"],"category":"视觉软件应用","tags":["综合"],"explanation":"完整的机器视觉字符识别软件流程包含四大核心模块：图像采集获取原始画面、图像处理优化画质、图像分割提取字符目标区域、字符识别完成信息解析，题干表述全面且正确。","type":"judge"}]},{"id":"wechat-copy","name":"副本综合练习题库","shortName":"副本题库","questions":[{"id":1001,"bankId":"wechat-copy","number":1,"sourceNumber":1,"stem":"在DobotVisionStudio里添加一个”相机图像”模块，在“触发源”选项中，应选择（）。通过单击单步执行，可以在图像显示窗口可以显示当前相机画面。","options":[{"label":"A","text":"LINE0"},{"label":"B","text":"LINE1"},{"label":"C","text":"LINE2"},{"label":"D","text":"SOFTWARE"}],"answer":["D"],"category":"机器人与标定","tags":["综合"],"explanation":"触发源分为硬件触发（LINE0/1/2，外部IO信号触发拍照）和软件触发SOFTWARE。软件触发由软件手动/单步执行触发相机采图，调试时单步查看画面必须选SOFTWARE；硬件触发多用于产线自动流水线拍照。","type":"single"},{"id":1002,"bankId":"wechat-copy","number":2,"sourceNumber":2,"stem":"芯片缺陷检测项目中，BLOB模块面积判断的数据类型？","options":[{"label":"A","text":"int"},{"label":"B","text":"float"},{"label":"C","text":"short"},{"label":"D","text":"long"}],"answer":["B"],"category":"视觉软件应用","tags":["综合"],"explanation":"BLOB分析输出的面积包含小数精度（如245.7像素），浮点型float可存储带小数的数值；int/short/long仅支持整数，无法保存像素面积小数精度，因此选用float。","type":"single"},{"id":1003,"bankId":"wechat-copy","number":3,"sourceNumber":3,"stem":"在进行视觉定位引导时，需要通过（ ）来建立视觉坐标系与机械手坐标系之间的对应关系。","options":[{"label":"A","text":"检测"},{"label":"B","text":"标定"},{"label":"C","text":"定位"},{"label":"D","text":"测量"}],"answer":["B"],"category":"机器视觉基础","tags":["综合"],"explanation":"手眼标定核心作用：建立相机像素坐标系、相机坐标系、机器人世界坐标系三者的坐标转换矩阵。单纯检测/定位/测量只能获取图像像素坐标，无法转换为机器人可执行的机械坐标。","type":"single"},{"id":1004,"bankId":"wechat-copy","number":4,"sourceNumber":4,"stem":"常见的光圈F值是（ ）。","options":[{"label":"A","text":"0.5"},{"label":"B","text":"1"},{"label":"C","text":"2"},{"label":"D","text":"3"}],"answer":["C"],"category":"成像与光学","tags":["综合"],"explanation":"工业镜头标准F光圈序列：F1.4、F2、F2.8、F4、F5.6、F8等。F0.5/F1进光量过大易过曝，F3不属于标准通用档位，F2是工业视觉最常用基础光圈。","type":"single"},{"id":1005,"bankId":"wechat-copy","number":5,"sourceNumber":5,"stem":"用500万像素相机（分辨率2592×1944）拍摄80mm的视场，则精度为（ ）。","options":[{"label":"A","text":"0.041"},{"label":"B","text":"0.031"},{"label":"C","text":"0.75"},{"label":"D","text":"0.01"}],"answer":["B"],"category":"成像与光学","tags":["综合"],"explanation":"像素精度=视场宽度÷水平像素数 计算：80 ÷ 2592 ≈ 0.031 mm/像素，代表单个像素对应实物0.031毫米。","type":"single"},{"id":1006,"bankId":"wechat-copy","number":6,"sourceNumber":6,"stem":"口服液杂质检测应选择（ ）光源。","options":[{"label":"A","text":"漫射光源"},{"label":"B","text":"红外光源"},{"label":"C","text":"紫外光源"},{"label":"D","text":"背光源"}],"answer":["B"],"category":"成像与光学","tags":["综合"],"explanation":"口服液瓶身有有色涂层、标签反光，可见光会被瓶体涂料干扰；红外光可穿透有机涂层，过滤表面干扰，清晰识别液体内部微小杂质颗粒。背光源仅测轮廓，漫射光易反光，紫外多用于荧光检测。","type":"single"},{"id":1007,"bankId":"wechat-copy","number":7,"sourceNumber":7,"stem":"喷锡PCB板检测优先选择（ ）光源。","options":[{"label":"A","text":"条形光源"},{"label":"B","text":"环形光源"},{"label":"C","text":"无影光源"},{"label":"D","text":"背光源"}],"answer":["C"],"category":"成像与光学","tags":["综合"],"explanation":"喷锡PCB表面金属反光极强，无影光源输出均匀漫射无定向光线，消除镜面反光、光斑，适合高反光金属表面字符、焊点、缺陷检测；条形/环形易产生局部反光，背光源仅测外轮廓。","type":"single"},{"id":1008,"bankId":"wechat-copy","number":8,"sourceNumber":8,"stem":"EAN-13条形码是一种（7，2）码，包含了13位数据字符，其中第13位为（）","options":[{"label":"A","text":"国家代码"},{"label":"B","text":"制造商代码"},{"label":"C","text":"商品代码"},{"label":"D","text":"校验码"}],"answer":["D"],"category":"识别与检测","tags":["综合"],"explanation":"EAN-13编码规则： 1~3位：国家/地区码（中国690~699）；4~8位：厂商码；9~12位：商品码；第13位校验码，通过固定算法校验前12位，防止条码识别错误。","type":"single"},{"id":1009,"bankId":"wechat-copy","number":9,"sourceNumber":9,"stem":"在工业应用中，可以使用（ ）消除工业现场环境复杂、光照不均等因素引起的噪声","options":[{"label":"A","text":"图形滤波"},{"label":"B","text":"图像增强"},{"label":"C","text":"颜色转换"},{"label":"D","text":"图像二值化"}],"answer":["A"],"category":"机器视觉基础","tags":["综合"],"explanation":"图像滤波（均值、高斯、中值滤波）专门去除画面噪点、光照杂斑；图像增强侧重提升对比度；二值化分割前景背景；颜色转换仅改变色彩空间，无法降噪。","type":"single"},{"id":1010,"bankId":"wechat-copy","number":10,"sourceNumber":10,"stem":"下列颜色叠加之后在黑白相机下呈现深色？","options":[{"label":"A","text":"红色+红色"},{"label":"B","text":"绿色+红色"},{"label":"C","text":"蓝色+蓝色"},{"label":"D","text":"蓝色+绿色"}],"answer":["B"],"category":"成像与光学","tags":["综合"],"explanation":"黑白相机灰度成像原理：红+绿混合为黄色，在单色灰度传感器中反射率低，灰度值低显示深色；同色叠加、蓝绿叠加灰度更高，画面更亮。","type":"single"},{"id":1011,"bankId":"wechat-copy","number":11,"sourceNumber":11,"stem":"机器视觉定位分拣工作应该包含（）个流程。","options":[{"label":"A","text":"7"},{"label":"B","text":"8"},{"label":"C","text":"9"},{"label":"D","text":"10"}],"answer":["A"],"category":"机器视觉基础","tags":["综合"],"explanation":"标准7大流程：图像采集→图像处理→图像分析→识别定位→手眼标定→坐标转换→工件分类抓取。","type":"single"},{"id":1012,"bankId":"wechat-copy","number":12,"sourceNumber":12,"stem":"DobotVisionStudio中，仿射变换（ ）的作用是旋转矩形超出图像边界部分的设置方式。","options":[{"label":"A","text":"尺度"},{"label":"B","text":"宽高比"},{"label":"C","text":"插值方法"},{"label":"D","text":"填充方式"}],"answer":["D"],"category":"机器人与标定","tags":["综合"],"explanation":"填充方式定义图像旋转/平移后超出画布区域填充黑色、白色或原图延伸；插值控制图像缩放模糊度；尺度/宽高比仅控制图像尺寸。","type":"single"},{"id":1013,"bankId":"wechat-copy","number":13,"sourceNumber":13,"stem":"( )适用于光照均匀性较差，或者存在多个带提取目标物，灰度范围较大的场景。","options":[{"label":"A","text":"硬阈值二值化"},{"label":"B","text":"高斯二值化"},{"label":"C","text":"均值二值化"},{"label":"D","text":"自动二值化"}],"answer":["C"],"category":"机器视觉基础","tags":["综合"], 键步骤。","type":"judge"},{"id":1090,"bankId":"wechat-copy","number":90,"sourceNumber":10,"stem":"Dobot Vision Studio中，卡尺工具边缘模式中边缘对，可以检测指定区域内的边缘位置，可用于定位、计数和判断有无等。","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["B"],"category":"机器人与标定","tags":["综合"],"explanation":"单边缘模式用于定位，边缘对专门测量两条边缘间距，单纯计数有无不使用边缘对模式。","type":"judge"},{"id":1091,"bankId":"wechat-copy","number":91,"sourceNumber":11,"stem":"机器人正解是通过关节角计算末端位姿，从多个位姿结果中取最优解","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["B"],"category":"机器人与标定","tags":["综合"],"explanation":"正运动学：关节角度→唯一末端位姿，无多解；逆运动学：末端位姿求解关节角度，存在多组解。","type":"judge"},{"id":1092,"bankId":"wechat-copy","number":92,"sourceNumber":12,"stem":"出现点位逆解算错误，可以通过调整机器人运行姿态来解决","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["A"],"category":"机器人与标定","tags":["综合"],"explanation":"同一目标点位存在多组关节姿态，某一姿态超出运动极限报错时，切换姿态即可正常求解逆解。","type":"judge"},{"id":1093,"bankId":"wechat-copy","number":93,"sourceNumber":13,"stem":"DobotStudio Pro与机器人通过网线直接连接进行通信，此时机器人控制柜的IP地址需与PC的IP地址在同一网段。","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["B"],"category":"机器人与标定","tags":["综合"],"explanation":"标准答案修正：网线直连必须同网段，本题原答案标注错误，正确逻辑应为A；若按文档原答案：不同网段路由转发才能通讯，直连无路由必须同网段，原解析存在错误。","type":"judge"},{"id":1094,"bankId":"wechat-copy","number":94,"sourceNumber":14,"stem":"PLC的工作方式是周期循环扫描工作方式 。","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["A"],"category":"PLC与电气控制","tags":["综合"],"explanation":"PLC循环扫描：输入采样→程序执行→输出刷新，周期性重复运行。","type":"judge"},{"id":1095,"bankId":"wechat-copy","number":95,"sourceNumber":15,"stem":"通过工厂复位,可以将S7-1200 CPU中存储的程序清除，但无法清除CPU所使用的IP地址。","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["B"],"category":"PLC与电气控制","tags":["综合"],"explanation":"工厂复位会清空用户程序、IP参数、存储卡配置，全部恢复出厂默认。","type":"judge"},{"id":1096,"bankId":"wechat-copy","number":96,"sourceNumber":16,"stem":"梯形图程序由指令助记符和操作数组成。","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["A"],"category":"PLC与电气控制","tags":["综合"],"explanation":"指令表（语句表）由助记符+操作数构成；梯形图图形等价转换为助记符指令。","type":"judge"},{"id":1097,"bankId":"wechat-copy","number":97,"sourceNumber":17,"stem":"利用 JUMP 指令，可以从主程序（OB）跳转到子程序（FC、FB）中。","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["B"],"category":"PLC与电气控制","tags":["综合"],"explanation":"JUMP仅在同一程序块内跳转；调用FC/FB使用CALL调用指令，不能用JUMP跨块跳转。","type":"judge"},{"id":1098,"bankId":"wechat-copy","number":98,"sourceNumber":18,"stem":"远心镜头工作距离是固定的。","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["A"],"category":"成像与光学","tags":["综合"],"explanation":"远心镜头依靠内部光阑设计消除透视畸变，仅在标定标准工作距离下成像无畸变，工作距离不可随意更改。","type":"judge"},{"id":1099,"bankId":"wechat-copy","number":99,"sourceNumber":19,"stem":"Dobot Vision Studio中高精度特征匹配相比快速匹配耗时较短，但是设置的特征更精细，匹配精度高。","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["B"],"category":"机器人与标定","tags":["综合"],"explanation":"高精度匹配提取海量细微特征，计算量大，耗时远长于快速匹配。","type":"judge"},{"id":1100,"bankId":"wechat-copy","number":100,"sourceNumber":20,"stem":"Dobot Vision Studio中高精度特征匹配相比快速匹配耗时较短，但是设置的特征更精细，匹配精度高。","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"answer":["B"],"category":"机器人与标定","tags":["综合"],"explanation":"同19题重复，高精度匹配精度高、运算速度慢。","type":"judge"}]}];
    let activeBank = BANKS[0];
    let QUESTIONS = activeBank.questions;
    const KEY = "rk-vision-quiz-v2";
    const now = () => Date.now();
    const day = 24 * 60 * 60 * 1000;

    const modes = [
      ["smart", "智能练习", "推荐"],
      ["order", "顺序练习", "逐题"],
      ["random", "随机练习", "打乱"],
      ["wrong", "错题复习", "纠错"],
      ["favorite", "收藏夹", "重点"],
      ["exam", "模拟考试", "计时"],
      ["browse", "浏览题库", "检索"],
    ];

    const state = {
      mode: "smart",
      bankId: activeBank.id,
      type: "all",
      current: 1,
      selected: new Set(),
      revealed: false,
      queue: [],
      exam: null,
      examResult: null,
      examReviewIds: null,
      progress: loadProgress(),
    };

    const $ = (id) => document.getElementById(id);
    let qById = new Map(QUESTIONS.map(q => [q.id, q]));

    function setActiveBank(bankId) {
      activeBank = BANKS.find(bank => bank.id === bankId) || BANKS[0];
      state.bankId = activeBank.id;
      QUESTIONS = activeBank.questions;
      qById = new Map(QUESTIONS.map(q => [q.id, q]));
      if (!qById.has(state.current)) state.current = -1;
      if ($("bankInfo")) {
        const counts = QUESTIONS.reduce((acc, q) => {
          acc[q.type] = (acc[q.type] || 0) + 1;
          return acc;
        }, {});
        $("bankInfo").textContent = `${QUESTIONS.length} 题 · 单选 ${counts.single || 0} · 多选 ${counts.multiple || 0} · 判断 ${counts.judge || 0}`;
      }
    }

    function loadProgress() {
      const blank = {
        version: 1,
        records: {},
        favorites: [],
        notes: {},
        streak: 0,
        bestStreak: 0,
        sessions: [],
      };
      try {
        return Object.assign(blank, JSON.parse(localStorage.getItem(KEY) || "{}"));
      } catch {
        return blank;
      }
    }

    function saveProgress() {
      localStorage.setItem(KEY, JSON.stringify(state.progress));
    }

    function recordOf(id) {
      if (!state.progress.records[id]) {
        state.progress.records[id] = {
          attempts: 0,
          correct: 0,
          wrong: 0,
          last: 0,
          due: 0,
          level: 0,
          mastered: false,
          history: [],
        };
      }
      return state.progress.records[id];
    }

    function filteredQuestions() {
      const query = $("searchInput").value.trim().toLowerCase();
      const category = $("categorySelect").value;
      const tag = $("tagSelect").value;
      return QUESTIONS.filter(q => {
        if (state.type !== "all" && q.type !== state.type) return false;
        if (category !== "all" && q.category !== category) return false;
        if (tag !== "all" && !q.tags.includes(tag)) return false;
        if (!query) return true;
        const haystack = [q.stem, q.category, q.tags.join(" "), q.explanation, q.options.map(o => o.text).join(" ")].join(" ").toLowerCase();
        return haystack.includes(query);
      });
    }

    function poolForMode() {
      const base = filteredQuestions();
      if (state.mode === "wrong" && state.examReviewIds?.length) return state.examReviewIds.map(id => qById.get(id)).filter(Boolean);
      if (state.mode === "wrong") return base.filter(q => (state.progress.records[q.id]?.wrong || 0) > 0);
      if (state.mode === "favorite") return base.filter(q => state.progress.favorites.includes(q.id));
      if (state.mode === "exam" && state.exam) return state.exam.ids.map(id => qById.get(id)).filter(Boolean);
      return base;
    }

    function smartScore(q) {
      const rec = state.progress.records[q.id];
      if (!rec) return 70 + (q.id % 17);
      const dueBoost = rec.due && rec.due <= now() ? 90 : 0;
      const weak = rec.wrong * 18 - rec.correct * 5;
      const old = rec.last ? Math.min(30, (now() - rec.last) / day) : 45;
      const unseen = rec.attempts ? 0 : 80;
      return dueBoost + weak + old + unseen - rec.level * 6;
    }

    function rebuildQueue() {
      let pool = poolForMode();
      if (!pool.length) pool = filteredQuestions();
      if (state.mode === "smart") {
        state.queue = [...pool].sort((a, b) => smartScore(b) - smartScore(a)).map(q => q.id);
      } else if (state.mode === "random") {
        state.queue = shuffle(pool.map(q => q.id));
      } else {
        state.queue = pool.map(q => q.id).sort((a, b) => a - b);
      }
      if (!state.queue.includes(state.current)) state.current = state.queue[0] || QUESTIONS[0].id;
    }

    function shuffle(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function renderTabs() {
      $("modeTabs").innerHTML = modes.map(([id, name, hint]) => `
        <button class="tab ${state.mode === id ? "active" : ""}" data-mode="${id}">
          <span>${name}</span><small>${hint}</small>
        </button>
      `).join("");
    }

    function renderBankSelect() {
      $("bankSelect").innerHTML = BANKS.map(bank => `
        <option value="${escapeAttr(bank.id)}" ${bank.id === state.bankId ? "selected" : ""}>${escapeHtml(bank.name)}</option>
      `).join("");
      setActiveBank(state.bankId);
    }

    function renderFilters() {
      const categories = ["all", ...new Set(QUESTIONS.map(q => q.category))].sort((a, b) => a === "all" ? -1 : a.localeCompare(b, "zh-CN"));
      const tags = ["all", ...new Set(QUESTIONS.flatMap(q => q.tags))].sort((a, b) => a === "all" ? -1 : a.localeCompare(b, "zh-CN"));
      $("categorySelect").innerHTML = categories.map(c => `<option value="${escapeAttr(c)}" ${c === "all" ? "selected" : ""}>${c === "all" ? "全部分类" : c}</option>`).join("");
      $("tagSelect").innerHTML = tags.map(t => `<option value="${escapeAttr(t)}" ${t === "all" ? "selected" : ""}>${t === "all" ? "全部标签" : t}</option>`).join("");
    }

    function render() {
      renderTabs();
      rebuildQueue();
      const browse = state.mode === "browse";
      const examIdle = state.mode === "exam" && !state.exam;
      $("practiceView").style.display = browse ? "none" : "grid";
      $("sideStack").style.display = browse || examIdle ? "none" : "";
      $("browseView").classList.toggle("show", browse);
      $("examBar").classList.toggle("show", state.mode === "exam" && !!state.exam);
      $("examHome").classList.toggle("show", examIdle);
      $("questionCard").style.display = examIdle ? "none" : "";
      $("noteDrawer").style.display = state.mode === "exam" ? "none" : "";

      const titles = {
        smart: ["智能练习", "优先安排错题、到期复习题和未练题。"],
        order: ["顺序练习", "按题号推进，适合第一轮过题。"],
        random: ["随机练习", "打乱题目顺序，适合考前唤醒。"],
        wrong: ["错题复习", "只看做错过的题。"],
        favorite: ["收藏夹", "只看手动收藏的重点题。"],
        exam: ["模拟考试", "计时答题，交卷后生成成绩。"],
        browse: ["浏览题库", "快速检索、定位和跳转。"],
      };
      [$("viewTitle").textContent, $("viewSubtitle").textContent] = titles[state.mode];

      if (browse) {
        $("examHome").classList.remove("show");
        renderBrowse();
      } else if (examIdle) {
        renderExamHome();
      } else {
        renderQuestion();
      }
      const inExam = state.mode === "exam";
      $("submitBtn").textContent = inExam ? "保存答案" : "提交";
      $("submitBtn").disabled = examIdle;
      $("prevBtn").disabled = examIdle;
      $("nextBtn").disabled = examIdle;
      $("randomBtn").disabled = inExam;
      $("favBtn").disabled = inExam;
      renderStats();
      renderHeatmap();
      renderQueue();
    }

    function renderExamHome() {
      const result = state.examResult;
      $("resultBox").className = "result";
      $("resultBox").innerHTML = "";
      if (result) {
        $("examHome").innerHTML = `
          <article class="exam-hero">
            <h3>考试成绩</h3>
            <p>本次模拟考试共 50 题，满分 100 分。单选 30 题、多选 10 题、判断 10 题。</p>
            <div class="score"><strong>${result.score}</strong><span>分</span></div>
            <div class="stats-grid">
              <div class="stat"><strong>${result.correct}</strong><span>答对</span></div>
              <div class="stat"><strong>${result.done}</strong><span>已答</span></div>
              <div class="stat"><strong>${result.minutes}</strong><span>分钟</span></div>
              <div class="stat"><strong>${result.accuracy}%</strong><span>正确率</span></div>
            </div>
          </article>
          <div class="actions" style="justify-content:flex-start">
            <button id="startExamBtn" class="primary">再考一次</button>
            <button id="reviewExamBtn">查看错题</button>
          </div>
        `;
      } else {
        $("examHome").innerHTML = `
          <article class="exam-hero">
            <h3>模拟考试</h3>
            <p>点击开始后随机抽取 50 题，满分 100 分。题型分配为单选 30 题、多选 10 题、判断 10 题，交卷后显示分数。</p>
          </article>
          <button id="startExamBtn" class="primary" style="width:max-content">开始考试</button>
        `;
      }
    }

    function renderQuestion() {
      const q = qById.get(state.current) || QUESTIONS[0];
      const rec = state.progress.records[q.id] || {};
      const examSaved = state.exam?.answers?.[q.id];
      state.current = q.id;
      state.selected = new Set(examSaved?.selected || []);
      state.revealed = false;

      $("metaRow").innerHTML = [
        `<span class="pill">#${q.number || q.id}</span>`,
        `<span class="pill">${typeName(q.type)}</span>`,
        `<span class="pill">${escapeHtml(q.category)}</span>`,
        ...q.tags.map(t => `<span class="pill warn">${escapeHtml(t)}</span>`),
        rec.mastered ? `<span class="pill ok">已掌握</span>` : "",
        rec.wrong ? `<span class="pill bad">错 ${rec.wrong}</span>` : "",
      ].join("");
      $("stem").textContent = q.stem;
      $("options").innerHTML = q.options.map(o => `
        <button class="option ${state.selected.has(o.label) ? "selected" : ""}" data-option="${o.label}">
          <span class="letter">${o.label}</span>
          <p>${escapeHtml(o.text)}</p>
        </button>
      `).join("");
      $("resultBox").className = "result";
      $("resultBox").innerHTML = "";
      $("submitBtn").disabled = false;
      $("noteInput").value = state.progress.notes[q.id] || "";
      $("favBtn").textContent = state.progress.favorites.includes(q.id) ? "★" : "☆";
      updateExamBar();
    }

    function renderStats() {
      const records = QUESTIONS.map(q => state.progress.records[q.id]).filter(Boolean);
      const answered = records.filter(r => r.attempts > 0).length;
      const correct = records.reduce((sum, r) => sum + r.correct, 0);
      const attempts = records.reduce((sum, r) => sum + r.attempts, 0);
      const wrong = records.filter(r => r.wrong > 0).length;
      const due = records.filter(r => r.due && r.due <= now() && !r.mastered).length;
      const mastered = records.filter(r => r.mastered).length;
      $("statAnswered").textContent = answered;
      $("statRate").textContent = attempts ? `${Math.round(correct / attempts * 100)}%` : "0%";
      $("statWrong").textContent = wrong;
      $("statDue").textContent = due;
      $("statStreak").textContent = state.progress.streak || 0;
      $("statMastered").textContent = mastered;
      $("progressFill").style.width = `${Math.round(answered / QUESTIONS.length * 100)}%`;
      $("modeTabs").querySelectorAll(".tab").forEach(btn => {
        const mode = btn.dataset.mode;
        const small = btn.querySelector("small");
        if (mode === "wrong") small.textContent = `${wrong} 题`;
        if (mode === "favorite") small.textContent = `${QUESTIONS.filter(q => state.progress.favorites.includes(q.id)).length} 题`;
      });
    }

    function renderHeatmap() {
      $("heatmap").innerHTML = QUESTIONS.map(q => {
        const rec = state.progress.records[q.id];
        const examAnswered = state.exam?.answers?.[q.id];
        const cls = q.id === state.current ? "current" : examAnswered ? "seen" : rec?.wrong ? "wrong" : rec?.correct ? "right" : rec?.attempts ? "seen" : "";
        return `<button class="dot ${cls}" title="第 ${q.number || q.id} 题" data-jump="${q.id}"></button>`;
      }).join("");
    }

    function renderQueue() {
      const ids = state.queue.slice(0, 12);
      $("queueList").innerHTML = ids.map(id => {
        const q = qById.get(id);
        const rec = state.progress.records[id];
        const status = state.exam ? (state.exam.answers[id] ? "已答" : "未答") : !rec ? "未练" : rec.wrong ? `错 ${rec.wrong}` : rec.mastered ? "掌握" : `对 ${rec.correct || 0}`;
        return `<button class="mini-item ${id === state.current ? "active" : ""}" data-jump="${id}">
          <strong>#${q.number || id}</strong>
          <span>${escapeHtml(q.stem)}</span>
          <small>${status}</small>
        </button>`;
      }).join("") || `<p style="color:var(--muted);margin:0">没有符合条件的题目</p>`;
    }

    function renderBrowse() {
      const rows = filteredQuestions();
      $("browseBody").innerHTML = rows.map(q => {
        const rec = state.progress.records[q.id];
        const status = !rec ? "未练" : rec.mastered ? "已掌握" : rec.wrong ? `错 ${rec.wrong}` : `已练 ${rec.attempts}`;
        return `<tr>
          <td>#${q.number || q.id}</td>
          <td>${escapeHtml(q.stem)}</td>
          <td>${escapeHtml(q.category)}</td>
          <td>${status}</td>
          <td><button data-open="${q.id}">打开</button></td>
        </tr>`;
      }).join("");
    }

    function selectOption(label) {
      const q = qById.get(state.current);
      if (state.revealed) return;
      if (q.type === "multiple") {
        state.selected.has(label) ? state.selected.delete(label) : state.selected.add(label);
      } else {
        state.selected = new Set([label]);
      }
      document.querySelectorAll(".option").forEach(btn => btn.classList.toggle("selected", state.selected.has(btn.dataset.option)));
    }

    function saveCurrentExamSelection(showToast = false) {
      if (!state.exam || !state.selected.size) return false;
      const q = qById.get(state.current);
      if (!q) return false;
      const selected = [...state.selected].sort();
      const answer = [...q.answer].sort();
      state.exam.answers[q.id] = { selected, correct: selected.join(",") === answer.join(",") };
      updateExamBar();
      if (showToast) toast("答案已保存");
      return true;
    }

    function submitAnswer() {
      const q = qById.get(state.current);
      if (!q || state.revealed || !state.selected.size) {
        if (!state.selected.size) toast("先选择答案");
        return;
      }
      const selected = [...state.selected].sort();
      const answer = [...q.answer].sort();
      const correct = selected.join(",") === answer.join(",");
      if (state.exam && state.mode === "exam") {
        saveCurrentExamSelection(true);
        renderHeatmap();
        renderQueue();
        const ids = state.queue.length ? state.queue : state.exam.ids;
        const idx = ids.indexOf(state.current);
        if (idx >= 0 && idx < ids.length - 1) move(1);
        return;
      }
      state.revealed = true;
      const rec = recordOf(q.id);
      rec.attempts += 1;
      rec.last = now();
      rec.history.push({ t: now(), selected, correct });
      rec.history = rec.history.slice(-20);
      if (correct) {
        rec.correct += 1;
        rec.level = Math.min(5, rec.level + 1);
        rec.due = now() + [1, 2, 4, 7, 15, 30][rec.level] * day;
        rec.mastered = rec.level >= 4 && rec.wrong === 0;
        state.progress.streak = (state.progress.streak || 0) + 1;
        state.progress.bestStreak = Math.max(state.progress.bestStreak || 0, state.progress.streak);
      } else {
        rec.wrong += 1;
        rec.level = Math.max(0, rec.level - 1);
        rec.due = now() + 6 * 60 * 60 * 1000;
        rec.mastered = false;
        state.progress.streak = 0;
      }
      if (state.exam) {
        state.exam.answers[q.id] = { selected, correct };
      }
      saveProgress();
      showResult(q, correct);
      renderStats();
      renderHeatmap();
      renderQueue();
    }

    function showResult(q, correct) {
      document.querySelectorAll(".option").forEach(btn => {
        const label = btn.dataset.option;
        btn.classList.toggle("correct", q.answer.includes(label));
        btn.classList.toggle("wrong", state.selected.has(label) && !q.answer.includes(label));
      });
      $("submitBtn").disabled = true;
      $("resultBox").className = "result show";
      $("resultBox").innerHTML = `
        <h3>${correct ? "回答正确" : "回答错误"}</h3>
        <p>正确答案：<strong>${q.answer.join("、")}</strong></p>
        <p>${q.explanation ? escapeHtml(q.explanation) : "这道题暂无解析，可以把自己的记忆点写到笔记里。"}</p>
        <div class="review-buttons">
          <button data-review="hard">还需巩固</button>
          <button data-review="normal">正常复习</button>
          <button data-review="master">标为掌握</button>
        </div>
      `;
    }

    function move(delta) {
      if (state.exam && state.mode === "exam") saveCurrentExamSelection(false);
      const ids = state.queue.length ? state.queue : QUESTIONS.map(q => q.id);
      const idx = Math.max(0, ids.indexOf(state.current));
      const next = ids[(idx + delta + ids.length) % ids.length];
      if (next) {
        state.current = next;
        render();
      }
    }

    function jumpTo(id, mode) {
      state.current = Number(id);
      if (mode) state.mode = mode;
      render();
    }

    function startExam() {
      const singles = shuffle(QUESTIONS.filter(q => q.type === "single")).slice(0, 30);
      const multiples = shuffle(QUESTIONS.filter(q => q.type === "multiple")).slice(0, 10);
      const judges = shuffle(QUESTIONS.filter(q => q.type === "judge")).slice(0, 10);
      const ids = shuffle([...singles, ...multiples, ...judges].map(q => q.id));
      state.exam = {
        ids,
        started: now(),
        answers: {},
        mix: { single: singles.length, multiple: multiples.length, judge: judges.length },
      };
      state.examResult = null;
      state.examReviewIds = null;
      state.current = state.exam.ids[0];
      toast(`模拟考试已开始：${ids.length} 题`);
      render();
    }

    function finishExam() {
      if (!state.exam) return;
      saveCurrentExamSelection(false);
      const total = state.exam.ids.length;
      const done = Object.keys(state.exam.answers).length;
      const correct = Object.values(state.exam.answers).filter(a => a.correct).length;
      const score = Math.round((correct / total) * 100);
      const minutes = Math.max(1, Math.round((now() - state.exam.started) / 60000));
      const wrongIds = state.exam.ids.filter(id => !state.exam.answers[id]?.correct);
      state.examResult = {
        total,
        done,
        correct,
        score,
        minutes,
        accuracy: Math.round((correct / total) * 100),
        wrongIds,
      };
      toast(`交卷完成：${score} 分`);
      state.progress.sessions.push({ t: now(), total, done, correct, score, minutes });
      state.progress.sessions = state.progress.sessions.slice(-20);
      state.exam = null;
      saveProgress();
      render();
    }

    function updateExamBar() {
      if (!state.exam) return;
      const elapsed = Math.floor((now() - state.exam.started) / 1000);
      const mm = String(Math.floor(elapsed / 60)).padStart(2, "0");
      const ss = String(elapsed % 60).padStart(2, "0");
      $("examTimer").textContent = `${mm}:${ss}`;
      $("examProgress").textContent = `${Object.keys(state.exam.answers).length} / ${state.exam.ids.length}`;
    }

    function typeName(type) {
      return type === "multiple" ? "多选" : type === "judge" ? "判断" : "单选";
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/`/g, "&#96;");
    }

    function toast(message) {
      $("toast").textContent = message;
      $("toast").classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => $("toast").classList.remove("show"), 2400);
    }

    document.addEventListener("click", (event) => {
      const option = event.target.closest("[data-option]");
      if (option) selectOption(option.dataset.option);

      const mode = event.target.closest("[data-mode]");
      if (mode) {
        const nextMode = mode.dataset.mode;
        const changed = state.mode !== nextMode;
        state.mode = nextMode;
        if (state.mode !== "wrong") state.examReviewIds = null;
        if (state.mode !== "exam") state.examResult = null;
        if (changed) state.current = -1;
        render();
      }

      if (event.target.closest("#startExamBtn")) {
        startExam();
      }

      if (event.target.closest("#reviewExamBtn")) {
        const wrongIds = state.examResult?.wrongIds || [];
        if (!wrongIds.length) {
          toast("本次考试没有错题");
        } else {
          state.examReviewIds = wrongIds;
          state.mode = "wrong";
          state.current = wrongIds[0];
          render();
        }
      }

      const jump = event.target.closest("[data-jump]");
      if (jump) jumpTo(jump.dataset.jump);

      const open = event.target.closest("[data-open]");
      if (open) jumpTo(open.dataset.open, "smart");

      const review = event.target.closest("[data-review]");
      if (review) {
        const rec = recordOf(state.current);
        if (review.dataset.review === "hard") {
          rec.mastered = false;
          rec.level = 0;
          rec.due = now() + 3 * 60 * 60 * 1000;
        }
        if (review.dataset.review === "normal") {
          rec.due = now() + 2 * day;
        }
        if (review.dataset.review === "master") {
          rec.mastered = true;
          rec.level = 5;
          rec.due = now() + 45 * day;
        }
        saveProgress();
        toast("复习计划已更新");
        renderStats();
        renderQueue();
      }
    });

    $("submitBtn").addEventListener("click", submitAnswer);
    $("nextBtn").addEventListener("click", () => move(1));
    $("prevBtn").addEventListener("click", () => move(-1));
    $("randomBtn").addEventListener("click", () => jumpTo(QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)].id));
    $("finishExamBtn").addEventListener("click", finishExam);
    $("favBtn").addEventListener("click", () => {
      const favs = state.progress.favorites;
      const idx = favs.indexOf(state.current);
      idx >= 0 ? favs.splice(idx, 1) : favs.push(state.current);
      saveProgress();
      render();
    });

    $("noteInput").addEventListener("input", () => {
      state.progress.notes[state.current] = $("noteInput").value;
      saveProgress();
    });

    $("bankSelect").addEventListener("change", () => {
      setActiveBank($("bankSelect").value);
      state.current = -1;
      state.queue = [];
      state.exam = null;
      state.examResult = null;
      state.examReviewIds = null;
      $("categorySelect").value = "all";
      $("tagSelect").value = "all";
      renderFilters();
      render();
    });

    ["searchInput", "categorySelect", "tagSelect"].forEach(id => $(id).addEventListener("input", render));
    $("typeTabs").addEventListener("click", event => {
      const btn = event.target.closest("[data-type]");
      if (!btn) return;
      state.type = btn.dataset.type;
      $("typeTabs").querySelectorAll("button").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });

    $("exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(state.progress, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "睿抗刷题进度.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    $("importBtn").addEventListener("click", () => $("importFile").click());
    $("importFile").addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;
      state.progress = Object.assign(loadProgress(), JSON.parse(await file.text()));
      saveProgress();
      toast("进度已导入");
      render();
    });

    $("resetBtn").addEventListener("click", () => {
      if (!confirm("确认清空本地刷题进度？")) return;
      localStorage.removeItem(KEY);
      state.progress = loadProgress();
      render();
    });

    $("printBtn").addEventListener("click", () => window.print());

    document.addEventListener("keydown", event => {
      if (["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) return;
      const key = event.key.toUpperCase();
      if (["A", "B", "C", "D", "E"].includes(key)) selectOption(key);
      if (event.key === "Enter") state.revealed ? move(1) : submitAnswer();
      if (event.key === "ArrowRight") move(1);
      if (event.key === "ArrowLeft") move(-1);
    });

    renderBankSelect();
    renderFilters();
    render();
    setInterval(updateExamBar, 1000);
  </script>
</body>
</html>
